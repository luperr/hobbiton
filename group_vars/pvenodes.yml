---
# Proxmox host specific vars — overrides all.yml where needed.

# --- UFW (Phase 1) ---
# Restrict Proxmox web UI (8006) to this subnet.
# Set to a single workstation IP for tighter control: "192.168.1.50"
ufw_lan_subnet: "192.168.1.0/24"
ufw_proxmox_ui_port: 8006
# Docker bridge networks — allow so containers can reach the host.
ufw_docker_subnet: "172.16.0.0/12"

# --- Network bridges (Phase 2) ---
# Router (EdgeRouter X) is the gateway for each VLAN — no NAT on Proxmox.
proxmox_phys_nic: "eno1"

proxmox_vlans:
  - vlan_id: 20
    bridge: vmbr1
    address: "10.10.20.2"
    prefix: "24"
    gateway: "10.10.20.1"
    comment: "Services VLAN 20"
  - vlan_id: 30
    bridge: vmbr2
    address: "10.10.30.2"
    prefix: "24"
    gateway: "10.10.30.1"
    comment: "Monitoring VLAN 30"