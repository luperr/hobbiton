---
# Proxmox host specific vars — overrides all.yml where needed.

# --- UFW ---
ufw_proxmox_ui_port: 8006
ufw_docker_subnet: "172.16.0.0/12"
ufw_monitoring_subnet: "10.10.30.0/24"

ufw_rules:
  - rule: allow
    port: "{{ ufw_proxmox_ui_port }}"
    proto: tcp
    src: "{{ ufw_lan_subnet }}"
  - rule: allow
    src: "{{ ufw_docker_subnet }}"
  - rule: allow
    port: "{{ ufw_proxmox_ui_port }}"
    proto: tcp
    src: "{{ ufw_monitoring_subnet }}"

ufw_deny_forward_subnets:
  - "10.10.20.0/24"
  - "10.10.30.0/24"
  - "10.10.60.0/24"

# --- Network bridges (Phase 2) ---
# Router (EdgeRouter X) is the gateway for each VLAN — no NAT on Proxmox.
proxmox_phys_nic: "eno1"

proxmox_vlans:
  - vlan_id: 20
    bridge: vmbr1
    address: "10.10.20.2"
    prefix: "24"
    gateway: "10.10.20.1"
    comment: "Services VLAN 20"
  - vlan_id: 30
    bridge: vmbr2
    address: "10.10.30.2"
    prefix: "24"
    gateway: "10.10.30.1"
    comment: "Monitoring VLAN 30"
  - vlan_id: 60
    bridge: vmbr3
    address: "10.10.60.2"
    prefix: "24"
    gateway: "10.10.60.1"
    comment: "exilemail VLAN 60"