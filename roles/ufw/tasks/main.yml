---
- name: Install ufw
  ansible.builtin.apt:
    name: ufw
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Default deny incoming
  community.general.ufw:
    default: deny
    direction: incoming

- name: Default allow outgoing
  community.general.ufw:
    default: allow
    direction: outgoing

- name: Allow SSH
  community.general.ufw:
    rule: allow
    port: "{{ ssh_port }}"
    proto: tcp

- name: Apply extra UFW rules
  community.general.ufw: "{{ item }}"
  loop: "{{ ufw_rules }}"

- name: Block subnet forwarding to LAN
  community.general.ufw:
    rule: deny
    route: true
    src: "{{ item }}"
    dest: "{{ ufw_lan_subnet }}"
  loop: "{{ ufw_deny_forward_subnets }}"
  when: ufw_deny_forward_subnets | length > 0 and ufw_lan_subnet != ""

- name: Enable ufw
  community.general.ufw:
    state: enabled
