---
- name: Install ufw
  ansible.builtin.apt:
    name: ufw
    state: present
    update_cache: true

- name: Default deny incoming
  community.general.ufw:
    default: deny
    direction: incoming

- name: Default allow outgoing
  community.general.ufw:
    default: allow
    direction: outgoing

- name: Allow SSH
  community.general.ufw:
    rule: allow
    port: "{{ ssh_port }}"
    proto: tcp

- name: Allow Proxmox web UI from LAN only
  community.general.ufw:
    rule: allow
    port: "{{ ufw_proxmox_ui_port }}"
    proto: tcp
    src: "{{ ufw_lan_subnet }}"

- name: Allow LXC bridge traffic to reach host
  community.general.ufw:
    rule: allow
    src: "{{ ufw_docker_subnet }}"

- name: Allow monitoring VLAN to reach Proxmox API
  community.general.ufw:
    rule: allow
    port: "{{ ufw_proxmox_ui_port }}"
    proto: tcp
    src: "{{ ufw_monitoring_subnet }}"

- name: Block VLAN forwarding to management LAN
  community.general.ufw:
    rule: deny
    route: true
    src: "{{ item }}"
    dest: "{{ ufw_lan_subnet }}"
  loop: "{{ ufw_vlan_subnets }}"

- name: Enable ufw
  community.general.ufw:
    state: enabled