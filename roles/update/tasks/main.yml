---
- name: Check for community-script updater
  ansible.builtin.stat:
    path: /usr/bin/update
  register: update_script

- name: Run application update
  ansible.builtin.command: /usr/bin/update
  register: update_result
  changed_when: false
  when: update_script.stat.exists

- name: Show update output
  ansible.builtin.debug:
    var: update_result.stdout_lines
  when: update_script.stat.exists

- name: No update script found
  ansible.builtin.debug:
    msg: "/usr/bin/update not present — skipping"
  when: not update_script.stat.exists

- name: Pull latest Docker images
  ansible.builtin.command: docker compose pull
  args:
    chdir: "{{ compose_project_dir }}"
  register: pull_result
  changed_when: "'Downloaded newer image' in pull_result.stdout or 'Pull complete' in pull_result.stdout"
  when: compose_project_dir | length > 0

- name: Recreate containers with new images
  community.docker.docker_compose_v2:
    project_src: "{{ compose_project_dir }}"
    state: present
    recreate: auto
  when: compose_project_dir | length > 0
