---
- name: Install Docker dependencies
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true

- name: Add Docker GPG key
  ansible.builtin.apt_key:
    url: https://download.docker.com/linux/debian/gpg
    state: present

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/debian bookworm stable"
    state: present

- name: Install Docker CE and compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Ensure Docker is enabled and running
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Create data directory
  ansible.builtin.file:
    path: "{{ opentrashmail_data_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ opentrashmail_data_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0640"
  notify: restart opentrashmail

- name: Start opentrashmail via compose
  community.docker.docker_compose_v2:
    project_src: "{{ opentrashmail_data_dir }}"
    pull: always
    state: present

- name: Install UFW
  ansible.builtin.apt:
    name: ufw
    state: present

- name: UFW — default deny incoming
  community.general.ufw:
    default: deny
    direction: incoming

- name: UFW — default allow outgoing
  community.general.ufw:
    default: allow
    direction: outgoing

- name: UFW — allow SSH
  community.general.ufw:
    rule: allow
    port: "{{ ssh_port }}"
    proto: tcp

- name: UFW — allow SMTP from anywhere
  community.general.ufw:
    rule: allow
    port: "{{ opentrashmail_smtp_port }}"
    proto: tcp

- name: UFW — allow web UI from LAN only
  community.general.ufw:
    rule: allow
    port: "{{ opentrashmail_http_port }}"
    proto: tcp
    src: "192.168.1.0/24"

- name: UFW — enable
  community.general.ufw:
    state: enabled
