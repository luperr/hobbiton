---
- name: Create data directory
  ansible.builtin.file:
    path: "{{ opentrashmail_data_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ opentrashmail_data_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0640"
  notify: restart opentrashmail

- name: Start opentrashmail via compose
  community.docker.docker_compose_v2:
    project_src: "{{ opentrashmail_data_dir }}"
    pull: missing
    state: present

