---
- name: Check data mount is present
  ansible.builtin.command: mountpoint -q {{ opentrashmail_data_mount }}
  changed_when: false
  failed_when: false
  register: mount_check

- name: Assert data mount is present
  ansible.builtin.assert:
    that: mount_check.rc == 0
    fail_msg: "{{ opentrashmail_data_mount }} is not mounted — run configure_storage.yml first"

- name: Stop and disable postfix (conflicts with SMTP port 25)
  ansible.builtin.systemd:
    name: postfix
    state: stopped
    enabled: false
  failed_when: false

- name: Create app directory
  ansible.builtin.file:
    path: "{{ opentrashmail_data_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Create data mount subdirectories
  ansible.builtin.file:
    path: "{{ opentrashmail_data_mount }}/{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0750"
  loop:
    - mail
    - data
    - logs

- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ opentrashmail_data_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0640"
  notify: restart opentrashmail

- name: Start opentrashmail via compose
  community.docker.docker_compose_v2:
    project_src: "{{ opentrashmail_data_dir }}"
    pull: missing
    state: present

