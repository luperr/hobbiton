- name: Install Prometheus
  apt:
    name: prometheus
    state: present
    update_cache: yes

- name: Deploy Prometheus configuration
  template:
    src: prometheus.yml.j2
    dest: /etc/prometheus/prometheus.yml
    owner: prometheus
    group: prometheus
    mode: '0644'
  notify: restart prometheus

- name: Enable and start Prometheus
  service:
    name: prometheus
    enabled: yes
    state: started
