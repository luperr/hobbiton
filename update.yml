---
# Update all managed services.
# Runs /usr/bin/update on each community-script LXC, and docker compose pull
# on any host with compose_project_dir defined.
#
# lxc_services (docker LXC) is excluded — updated manually per release.
#
# Usage:
#   ansible-playbook update.yml              # all hosts
#   ansible-playbook update.yml --limit pihole

- name: Update services
  hosts: lxc_all:!lxc_services
  roles:
    - update
